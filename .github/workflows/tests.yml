# Cross-platform portability net — every push proves the suite on all three
# OSes. Linux and macOS run everything; Windows runs the portable core
# (scheduler backends, armory, equip, floor, preflight, dashboards) while the
# POSIX-flavored shell/hook tests are ported incrementally.
name: tests

on:
  push:
    branches: [main, "feat/**"]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]" || python -m pip install -e . pytest
      - name: Full suite (POSIX)
        if: runner.os != 'Windows'
        run: python -m pytest tests -q
        env:
          PYTHONPATH: src
          # The spawn layer refuses to run without a wired claude runtime —
          # a real guard in production, a stub in CI (every spawn is mocked).
          CADRE_CLAUDE_BIN: /bin/echo
      - name: Portable core (Windows)
        if: runner.os == 'Windows'
        run: >
          python -m pytest tests -q
          -k "sched or inventory or equip or floor or preflight or heartbeat
          or dashboard or launch or secrets or sysconfig or snapshot or
          seedkit or db or notify"
        env:
          PYTHONPATH: src
