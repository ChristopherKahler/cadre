<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="theme-color" content="#0f1211">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<title>Cadre — Boardroom</title>
<style>
:root{
  --canvas:#0f1211; --surface:#161a18; --raised:#1c211e;
  --line:#252b27; --line-hi:#33403a; --ink:#e8ebe9; --dim:#8a938e;
  --green:#22c55e; --green-soft:#34d399; --green-dim:rgba(34,197,94,.10);
  --gold:#d4a94a; --gold-dim:rgba(212,169,74,.10); --red:#ef4444;
  --mono:'SF Mono',ui-monospace,'JetBrains Mono',Menlo,monospace;
  --glow:0 0 0 1px rgba(34,197,94,.20), 0 8px 32px rgba(34,197,94,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--canvas);color:var(--ink);font:13px/1.55 var(--mono);display:flex;overflow:hidden;height:100dvh}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-thumb{background:var(--line-hi);border-radius:4px}

/* ---- sidebar ---- */
#side{width:280px;min-width:280px;border-right:1px solid var(--line);background:var(--surface);display:flex;flex-direction:column}
#brand{padding:16px 16px 12px;border-bottom:1px solid var(--line)}
#brand .word{letter-spacing:.22em;font-size:11px;color:var(--dim)}
#brand .name{font-size:15px;letter-spacing:.06em;margin-top:2px}
#brand .name b{color:var(--green)}
#newconv{margin:8px 12px 12px;padding:9px 12px;border:1px solid var(--line-hi);border-radius:6px;color:var(--green-soft);text-align:left;transition:all .15s}
#newconv:hover{box-shadow:var(--glow);border-color:var(--green)}
#switch{margin:12px 12px 0;position:relative}
#switchbtn{width:100%;display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid var(--line);border-radius:6px;color:var(--ink);text-align:left}
#switchbtn:hover{border-color:var(--line-hi);background:var(--raised)}
#switchbtn .caret{margin-left:auto;color:var(--dim);font-size:10px}
#switchmenu{display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--raised);border:1px solid var(--line-hi);border-radius:8px;box-shadow:var(--lift);z-index:30;max-height:55vh;overflow-y:auto;padding:6px}
#switchmenu.on{display:block}
#switchmenu a{display:block;padding:8px 10px;border-radius:6px;color:var(--ink);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#switchmenu a:hover{background:var(--green-dim);color:var(--green-soft)}
#switchmenu a.hub{color:var(--green-soft);border-bottom:1px solid var(--line);border-radius:6px 6px 0 0;margin-bottom:6px;padding-bottom:9px}
#convs{flex:1;overflow-y:auto;padding:0 8px 12px}
.conv{padding:9px 10px;border-radius:6px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;display:flex;gap:8px;align-items:baseline}
.conv:hover{background:var(--raised)}
.conv.active{background:var(--raised);border-color:var(--line-hi)}
.conv .dot{width:7px;height:7px;border-radius:50%;background:var(--line-hi);flex:none;position:relative;top:-1px}
.conv.running .dot{background:var(--gold);box-shadow:0 0 6px var(--gold);animation:pulse 1.4s infinite}
.conv .t{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv .when{font-size:10px;color:var(--dim);flex:none}
@keyframes pulse{50%{opacity:.35}}
#foot{padding:10px 16px;border-top:1px solid var(--line);font-size:10px;color:var(--dim);display:flex;gap:10px}
#foot .pill{border:1px solid var(--line-hi);border-radius:99px;padding:1px 8px}
#foot .pill.approve{color:var(--gold);border-color:var(--gold)}
#foot .pill.skip{color:var(--red);border-color:rgba(239,68,68,.5)}

/* ---- main ---- */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#head{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;min-height:53px}
#head #title{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:0 1 auto;min-width:0}
#status{font-size:10px;letter-spacing:.12em;color:var(--dim);border:1px solid var(--line-hi);border-radius:99px;padding:2px 10px;flex:none}
#status.running{color:var(--gold);border-color:var(--gold)}
#firms{display:flex;gap:6px;overflow:hidden;min-width:0;flex:0 1 auto}
.firmbadge{font-size:10px;letter-spacing:.1em;color:var(--gold);background:var(--gold-dim);border:1px solid rgba(212,169,74,.45);border-radius:99px;padding:2px 10px;white-space:nowrap;flex:none;text-decoration:none;cursor:pointer}
.firmbadge:hover{border-color:var(--gold);box-shadow:0 0 0 1px rgba(212,169,74,.25)}
.firmbadge .nt{margin-left:6px;opacity:.65}
.firmbadge .nt:hover{opacity:1}
#ctx{display:none;margin-left:auto;font-size:10px;letter-spacing:.08em;color:var(--dim);border:1px solid var(--line-hi);border-radius:99px;padding:2px 10px;flex:none}
#ctx.warn{color:var(--gold);border-color:var(--gold)}
#ctx.hot{color:var(--red);border-color:rgba(239,68,68,.6)}
#log{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
#log .day{align-self:center;font-size:10px;color:var(--dim);letter-spacing:.1em;margin:6px 0 2px}

.msg{max-width:78%;padding:10px 14px;border-radius:10px;white-space:pre-wrap;word-wrap:break-word}
.msg.operator{align-self:flex-end;background:var(--green-dim);border:1px solid rgba(34,197,94,.25);border-bottom-right-radius:3px;position:relative}
.steermark{position:absolute;bottom:4px;font-size:11px;color:var(--dim);cursor:default;letter-spacing:-1px}
.steermark.delivered{color:var(--green-soft)}
.msg.board{align-self:flex-start;background:var(--surface);border:1px solid var(--line);border-bottom-left-radius:3px}
.msg.board.say{border-left:2px solid var(--gold)}
.msg .tag{display:block;font-size:9px;letter-spacing:.14em;color:var(--gold);margin-bottom:4px}
.msg.board .md{white-space:normal}
.md h1,.md h2,.md h3{font-size:13px;color:var(--green-soft);margin:8px 0 4px}
.md p{margin:6px 0}
.md ul{margin:6px 0 6px 18px}
.md code{background:var(--raised);border:1px solid var(--line);border-radius:3px;padding:0 4px}
.md pre{background:var(--raised);border:1px solid var(--line);border-radius:6px;padding:8px 10px;overflow-x:auto;margin:8px 0}
.md pre code{background:none;border:none;padding:0}
.md b,.md strong{color:var(--green-soft)}
.md a{color:var(--green-soft);text-decoration:underline;text-underline-offset:3px;word-break:break-all}
.md a:hover{color:var(--green)}

.note{align-self:center;font-size:11px;color:var(--dim);padding:3px 12px;text-align:center;max-width:86%}
.note.error{color:var(--red);border:1px solid rgba(239,68,68,.35);border-radius:6px;padding:8px 12px;white-space:pre-wrap;text-align:left}
.note.steer{color:var(--gold)}

.approval{align-self:flex-start;max-width:78%;background:var(--gold-dim);border:1px solid rgba(212,169,74,.4);border-radius:10px;padding:12px 14px}
.approval .who{font-size:10px;letter-spacing:.14em;color:var(--gold);margin-bottom:6px}
.approval .tool{margin-bottom:6px}
.approval pre{background:var(--canvas);border:1px solid var(--line);border-radius:6px;padding:8px 10px;font-size:11px;overflow-x:auto;max-height:180px;margin-bottom:10px}
.approval .row{display:flex;gap:8px;align-items:center}
.approval .allow,.approval .deny{border-radius:6px;padding:6px 16px;border:1px solid;letter-spacing:.06em}
.approval .allow{color:var(--green);border-color:var(--green)}
.approval .allow:hover{background:var(--green-dim);box-shadow:var(--glow)}
.approval .deny{color:var(--red);border-color:rgba(239,68,68,.6)}
.approval .deny:hover{background:rgba(239,68,68,.12)}
.approval .verdict{font-size:11px;letter-spacing:.08em}
.approval .verdict.allow{color:var(--green)}
.approval .verdict.deny,.approval .verdict.timeout{color:var(--red)}

#ticker{display:none;padding:7px 20px;border-top:1px solid var(--line);background:var(--surface);font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#ticker.on{display:block}
#ticker .gear{display:inline-block;color:var(--gold);animation:spin 2.4s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

#composer{border-top:1px solid var(--line);background:var(--surface);padding:12px 20px 8px}
#composer .box{display:flex;gap:10px;align-items:flex-end;background:var(--canvas);border:1px solid var(--line-hi);border-radius:8px;padding:9px 14px;transition:box-shadow .15s}
#composer .box:focus-within{box-shadow:var(--glow);border-color:var(--green)}
#input{flex:1;background:none;border:none;outline:none;color:var(--ink);font:inherit;resize:none;max-height:180px;line-height:20px;padding:3px 0;height:26px}
.btns{display:flex;flex-direction:column;gap:6px;flex:none;align-self:flex-end}
#send{color:var(--green);padding:3px 12px;line-height:20px;border:1px solid var(--green);border-radius:6px;letter-spacing:.06em}
#send:hover{background:var(--green-dim)}
#send:disabled{opacity:.35;cursor:default}
#newline{display:none;color:var(--dim);padding:3px 12px;line-height:20px;border:1px solid var(--line-hi);border-radius:6px}
#newline:active{color:var(--green-soft);border-color:var(--green-soft)}
#hint{font-size:10px;color:var(--dim);padding:6px 2px 2px}
#offline{display:none;position:fixed;top:0;left:0;right:0;background:var(--red);color:#fff;text-align:center;font-size:11px;padding:3px;z-index:9}
#offline.on{display:block}
#empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--dim)}
#empty .big{font-size:15px;color:var(--ink)}

/* ---- mobile (tailscale-on-phone is the primary remote path) ---- */
#menu{display:none;border:1px solid var(--line-hi);border-radius:6px;padding:6px 11px;color:var(--green-soft);flex:none;font-size:14px;line-height:1}
#backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:15}
#backdrop.on{display:block}
@media (max-width:720px){
  #menu{display:block}
  #side{position:fixed;left:0;top:0;bottom:0;z-index:20;transform:translateX(-105%);transition:transform .2s ease;box-shadow:0 0 40px rgba(0,0,0,.6)}
  #side.open{transform:none}
  #head{padding:10px 12px;min-height:0;gap:10px}
  #log{padding:14px 12px;gap:8px}
  .msg{max-width:88%}
  .approval{max-width:92%}
  #hint{display:none}
  #composer{padding:10px 12px calc(10px + env(safe-area-inset-bottom))}
  #send{padding:8px 16px}
  #newline{display:block;padding:8px 16px}
  #input{min-height:66px}   /* taller resting composer on the phone */
  #newconv{padding:12px}
  .conv{padding:12px 10px}
}
</style>
</head>
<body>
<div id="offline">rail daemon unreachable — reconnecting…</div>

<aside id="side">
  <div id="brand">
    <div class="word">CADRE · RAIL</div>
    <div class="name"><b>Co-Board</b> chat</div>
  </div>
  <div id="switch">
    <button id="switchbtn">⌂ <span>Boardrooms</span><span class="caret">▾</span></button>
    <div id="switchmenu"></div>
  </div>
  <button id="newconv">+ new conversation</button>
  <div id="convs"></div>
  <div id="foot">
    <span class="pill" id="modePill">—</span>
    <span class="pill" id="modelPill">model: default</span>
  </div>
</aside>

<div id="backdrop"></div>

<main id="main">
  <div id="head">
    <button id="menu" aria-label="conversations">☰</button>
    <div id="title">Boardroom</div>
    <span id="status">IDLE</span>
    <div id="firms"></div>
    <span id="ctx"></span>
  </div>
  <div id="log">
    <div id="empty">
      <div class="big">The boardroom is open.</div>
      <div>Type below to open a portfolio session — or scope one firm with <code>@&lt;firm-id&gt; …</code></div>
    </div>
  </div>
  <div id="ticker"><span class="gear">⚙</span><span id="tickerText"></span></div>
  <div id="composer">
    <div class="box">
      <textarea id="input" rows="1" placeholder="Message the Co-Board…"></textarea>
      <div class="btns">
        <button id="newline" aria-label="new line">↵</button>
        <button id="send">SEND</button>
      </div>
    </div>
    <div id="hint">Enter to send · Shift+Enter for a new line · @&lt;firm-id&gt; scopes a fresh conversation to one firm</div>
  </div>
</main>

<script>
"use strict";
const $ = id => document.getElementById(id);
const state = {convs: [], active: null, seq: 0, es: null, sending: false};
const coarse = matchMedia("(pointer: coarse)").matches;   // phone/tablet

function toggleDrawer(force) {
  const open = force !== undefined ? force : !$("side").classList.contains("open");
  $("side").classList.toggle("open", open);
  $("backdrop").classList.toggle("on", open);
}

const fmtWhen = ts => {
  const d = new Date(ts * 1000), now = new Date();
  return d.toDateString() === now.toDateString()
    ? d.toLocaleTimeString([], {hour: "2-digit", minute: "2-digit"})
    : d.toLocaleDateString([], {month: "short", day: "numeric"});
};

const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

/* minimal markdown for board replies — escape first, then decorate */
function md(text) {
  const parts = esc(text).split(/```/);
  let out = "";
  parts.forEach((part, i) => {
    if (i % 2) { out += "<pre><code>" + part.replace(/^\w+\n/, "") + "</code></pre>"; return; }
    out += part
      .replace(/https?:\/\/[^\s<`]+/g, u => {
        // trailing sentence punctuation isn't part of the URL
        const trail = (u.match(/[.,;:!?)\]]+$/) || [""])[0];
        const core = trail ? u.slice(0, -trail.length) : u;
        return `<a href="${core}" target="_blank" rel="noopener">${core}</a>${trail}`;
      })
      .replace(/`([^`\n]+)`/g, "<code>$1</code>")
      .replace(/\*\*([^*\n]+)\*\*/g, "<b>$1</b>")
      .replace(/^#{1,6}\s+(.+)$/gm, "<h3>$1</h3>")
      .replace(/^[-•]\s+(.+)$/gm, "<li>$1</li>")
      .replace(/(<li>.*<\/li>\n?)+/g, m => "<ul>" + m + "</ul>")
      .replace(/\n\n+/g, "</p><p>")
      .replace(/\n/g, "<br>");
    });
  return "<p>" + out + "</p>";
}

/* ---- rendering ---- */
function renderSidebar() {
  const box = $("convs");
  box.innerHTML = "";
  state.convs.forEach(c => {
    const el = document.createElement("div");
    el.className = "conv" + (c.id === state.active ? " active" : "") + (c.status === "running" ? " running" : "");
    el.innerHTML = `<span class="dot"></span><span class="t"></span><span class="when">${fmtWhen(c.last_ts)}</span>`;
    el.querySelector(".t").textContent = c.title || "(untitled)";
    el.onclick = () => openConversation(c.id);
    box.appendChild(el);
  });
}

function messageNode(m) {
  if (m.kind === "approval") {
    const el = document.createElement("div");
    el.className = "approval";
    el.dataset.approval = m.approval_id;
    el.innerHTML = `<div class="who">🛡 PERMISSION GATE</div>
      <div class="tool">Co-Board wants to run: <code></code></div><pre></pre><div class="row"></div>`;
    el.querySelector("code").textContent = m.tool_name || "?";
    el.querySelector("pre").textContent = m.detail || "";
    setVerdictRow(el, m.verdict, m.approval_id, m.timeout_sec);
    return el;
  }
  if (m.kind === "steer") {
    // Non-intrusive iMessage mechanics on the operator message it steered:
    // ✓ = in the ping inbox, ✓✓ = landed inside the live session's system
    // messages (expect its reply). Explanation rides as the tooltip.
    const ops = document.querySelectorAll("#log .msg.operator");
    const target = ops[ops.length - 1];
    if (target) {
      const count = target.querySelectorAll(".steermark").length;
      const mark = document.createElement("span");
      mark.dataset.mid = m.id;
      mark.style.left = (-26 - count * 20) + "px";
      setReceipt(mark, m.receipt);
      target.appendChild(mark);
      return null;
    }
  }
  if (m.role === "system") {
    const el = document.createElement("div");
    el.className = "note " + (m.kind || "");
    el.textContent = m.text;
    return el;
  }
  const el = document.createElement("div");
  el.className = "msg " + m.role + (m.kind === "say" ? " say" : "");
  if (m.role === "board") {
    if (m.kind === "say") el.innerHTML = `<span class="tag">MID-TURN</span>`;
    const body = document.createElement("div");
    body.className = "md";
    body.innerHTML = md(m.text);
    el.appendChild(body);
  } else {
    el.textContent = m.text;
  }
  return el;
}

function setReceipt(mark, receipt) {
  const delivered = receipt === "delivered";
  mark.className = "steermark" + (delivered ? " delivered" : "");
  mark.textContent = delivered ? "✓✓" : "✓";
  mark.title = delivered
    ? "delivered — landed inside the live session; expect its reply to fold this in"
    : "sent — steered into the live turn, waiting for the session to pick it up";
}

function setVerdictRow(card, verdict, id, timeoutSec) {
  const row = card.querySelector(".row");
  if (verdict) {
    const label = {allow: "✅ allowed by the Board", deny: "⛔ denied by the Board",
                   timeout: "⌛ no answer — denied"}[verdict] || verdict;
    row.innerHTML = `<span class="verdict ${verdict}">${label}</span>`;
    return;
  }
  row.innerHTML = `<button class="allow">ALLOW</button><button class="deny">DENY</button>
    <span class="verdict">waiting${timeoutSec ? " · up to " + timeoutSec + "s" : ""}</span>`;
  row.querySelector(".allow").onclick = () => sendVerdict(id, "allow");
  row.querySelector(".deny").onclick = () => sendVerdict(id, "deny");
}

function appendMessage(m) {
  const empty = $("empty");
  if (empty) empty.remove();
  const log = $("log");
  const stick = log.scrollTop + log.clientHeight >= log.scrollHeight - 60;
  const node = messageNode(m);   // null when the message rendered as a mark
  if (node) log.appendChild(node);
  if (stick) log.scrollTop = log.scrollHeight;
}

/* one word for "what is the model doing right now", from the activity line */
function verbFor(line) {
  if (!line) return "working";
  if (line.startsWith("⚙ ")) {
    const tool = line.slice(2).trim();
    if (/^(Read|Grep|Glob|LSP|ReadMcpResource)/i.test(tool)) return "reading";
    if (/^(Write|Edit|NotebookEdit)/i.test(tool)) return "writing";
    if (/^(WebSearch|WebFetch)/i.test(tool)) return "searching";
    if (/^(Task|Agent)/i.test(tool)) return "delegating";
    if (/^Bash/i.test(tool)) return "running";
    return "working";
  }
  return "thinking";
}

function firmDashUrl(slug) {
  return (state.dash || "") + "/f/" + encodeURIComponent(slug) + "/";
}

function renderFirms(list) {
  const box = $("firms");
  box.innerHTML = "";
  (list || []).forEach(f => {
    const b = document.createElement("a");
    b.className = "firmbadge";
    b.href = firmDashUrl(f.slug);
    b.textContent = f.name || f.slug;
    b.title = "open the " + (f.name || f.slug) + " boardroom (in this tab)";
    const nt = document.createElement("span");
    nt.className = "nt";
    nt.textContent = "↗";
    nt.title = "open " + (f.name || f.slug) + " in a new tab";
    nt.onclick = e => {
      e.preventDefault();
      e.stopPropagation();
      window.open(b.href, "_blank", "noopener");
    };
    b.appendChild(nt);
    box.appendChild(b);
  });
}

function buildSwitcher() {
  const menu = $("switchmenu");
  menu.innerHTML = "";
  const hub = document.createElement("a");
  hub.className = "hub";
  hub.href = (state.dash || "") + "/next";
  hub.textContent = "⌂ All boardrooms";
  menu.appendChild(hub);
  (state.firmList || []).forEach(f => {
    const a = document.createElement("a");
    a.href = firmDashUrl(f.slug);
    a.textContent = f.name || f.slug;
    menu.appendChild(a);
  });
}

const fmtTokens = n => n >= 1e6
  ? (n / 1e6).toFixed(1).replace(/\.0$/, "") + "M"
  : Math.round(n / 1000) + "k";

function renderCtx(ctx) {
  const el = $("ctx");
  if (!ctx || !ctx.tokens || !ctx.window) { el.style.display = "none"; return; }
  const pct = Math.round(100 * ctx.tokens / ctx.window);
  el.style.display = "inline-block";
  el.textContent = "CTX " + fmtTokens(ctx.tokens) + " · " + pct + "%";
  el.className = pct >= 85 ? "hot" : pct >= 60 ? "warn" : "";
  el.title = ctx.tokens.toLocaleString() + " of " + ctx.window.toLocaleString()
    + " context tokens after the last turn";
}

function setStatus(status, verb) {
  const pill = $("status");
  pill.textContent = (status === "running" ? (verb || "working") : status).toUpperCase();
  pill.className = status === "running" ? "running" : "";
  $("ticker").className = status === "running" ? "on" : "";
  if (status !== "running") $("tickerText").textContent = "";
}

/* ---- data flow ---- */
async function api(path, body) {
  const r = await fetch(path, body === undefined ? {} :
    {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body)});
  return r.json();
}

async function boot() {
  const s = await api("/api/state");
  state.convs = s.conversations;
  state.seq = s.seq;
  state.dash = s.dash_url || "";
  state.firmList = s.firms || [];
  $("modePill").textContent = s.mode;
  $("modePill").className = "pill " + s.mode;
  $("modelPill").textContent = "model: " + (s.model || "default");
  buildSwitcher();
  renderSidebar();
  connect();
}

async function openConversation(id) {
  state.active = id;
  renderSidebar();
  toggleDrawer(false);
  const r = await api("/api/conversations/" + id);
  if (!r.ok) return;
  $("title").textContent = (state.convs.find(c => c.id === id) || {}).title
    || r.conversation.title || "Boardroom";
  const log = $("log");
  log.innerHTML = "";
  r.conversation.messages.forEach(appendMessage);
  log.scrollTop = log.scrollHeight;
  setStatus(r.status === "running" ? "running" : "idle");
  renderFirms(r.firms);
  renderCtx(r.context);
  $("input").focus();
}

function newConversation() {
  state.active = null;
  renderSidebar();
  toggleDrawer(false);
  $("title").textContent = "Boardroom";
  $("log").innerHTML = `<div id="empty"><div class="big">The boardroom is open.</div>
    <div>Type below to open a portfolio session — or scope one firm with <code>@&lt;firm-id&gt; …</code></div></div>`;
  setStatus("idle");
  renderFirms([]);
  renderCtx(null);
  $("input").focus();
}

async function send() {
  const input = $("input");
  const text = input.value.trim();
  if (!text || state.sending) return;
  state.sending = true;
  $("send").disabled = true;
  try {
    const r = await api("/api/messages", {conversation_id: state.active, text});
    if (r.ok) {
      input.value = "";
      input.style.height = "auto";
      if (state.active !== r.conversation_id) {
        // A fresh conversation's first events (operator message, ack,
        // status) race the POST response — re-fetch instead of trusting
        // the stream to have been watched from message one.
        await openConversation(r.conversation_id);
      }
    }
  } finally {
    state.sending = false;
    $("send").disabled = false;
    input.focus();
  }
}

async function sendVerdict(id, verdict) {
  await api("/api/approve/" + id + "/verdict", {verdict});
}

/* ---- SSE ---- */
function connect() {
  if (state.es) state.es.close();
  const es = new EventSource("/api/events?since=" + state.seq);
  state.es = es;
  es.onopen = () => $("offline").className = "";
  es.onerror = () => {
    $("offline").className = "on";
    es.close();
    setTimeout(connect, 2500);
  };
  const track = e => { state.seq = Math.max(state.seq, Number(e.lastEventId) || 0); };

  es.addEventListener("conversation", e => {
    track(e);
    const c = JSON.parse(e.data);
    c.status = "idle";
    state.convs.unshift(c);
    renderSidebar();
  });
  es.addEventListener("message", e => {
    track(e);
    const d = JSON.parse(e.data);
    const c = state.convs.find(x => x.id === d.conversation_id);
    if (c) { c.last_ts = d.message.ts; if (!c.title && d.message.role === "operator") c.title = d.message.text.slice(0, 64); }
    state.convs.sort((a, b) => b.last_ts - a.last_ts);
    renderSidebar();
    if (d.conversation_id === state.active) appendMessage(d.message);
  });
  es.addEventListener("status", e => {
    track(e);
    const d = JSON.parse(e.data);
    const c = state.convs.find(x => x.id === d.conversation_id);
    if (c) c.status = d.status;
    renderSidebar();
    if (d.conversation_id === state.active) setStatus(d.status);
  });
  es.addEventListener("activity", e => {
    track(e);
    const d = JSON.parse(e.data);
    if (d.conversation_id === state.active) {
      $("tickerText").textContent = d.line;
      setStatus("running", verbFor(d.line));   // activity implies a live turn
    }
  });
  es.addEventListener("firms", e => {
    track(e);
    const d = JSON.parse(e.data);
    if (d.conversation_id === state.active) renderFirms(d.firms);
  });
  es.addEventListener("context", e => {
    track(e);
    const d = JSON.parse(e.data);
    if (d.conversation_id === state.active) renderCtx(d);
  });
  es.addEventListener("receipt", e => {
    track(e);
    const d = JSON.parse(e.data);
    if (d.conversation_id !== state.active) return;
    const mark = document.querySelector(`#log .steermark[data-mid="${d.message_id}"]`);
    if (mark) setReceipt(mark, d.receipt);
  });
  es.addEventListener("approval", e => {
    track(e);
    const d = JSON.parse(e.data);
    if (d.conversation_id !== state.active) return;
    const card = document.querySelector(`[data-approval="${d.id}"]`);
    if (card) setVerdictRow(card, d.verdict, d.id);
  });
}

/* ---- wiring ---- */
$("send").onclick = send;
$("newconv").onclick = newConversation;
$("menu").onclick = () => toggleDrawer();
$("backdrop").onclick = () => toggleDrawer(false);
$("switchbtn").onclick = e => {
  e.stopPropagation();
  $("switchmenu").classList.toggle("on");
};
document.addEventListener("click", e => {
  if (!e.target.closest("#switch")) $("switchmenu").classList.remove("on");
});
// keep the soft keyboard open: never let the button steal focus
$("newline").addEventListener("pointerdown", e => e.preventDefault());
$("newline").onclick = () => {
  const inp = $("input");
  inp.focus();
  const start = inp.selectionStart ?? inp.value.length;
  inp.setRangeText("\n", start, inp.selectionEnd ?? start, "end");
  inp.dispatchEvent(new Event("input"));   // retrigger auto-grow
};
$("input").addEventListener("keydown", e => {
  // Soft keyboards: Enter makes a newline, SEND sends — chat convention.
  if (e.key === "Enter" && !e.shiftKey && !coarse) { e.preventDefault(); send(); }
});
$("input").addEventListener("input", e => {
  e.target.style.height = "auto";
  e.target.style.height = Math.min(e.target.scrollHeight, 180) + "px";
});
boot();
</script>
