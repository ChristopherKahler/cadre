/* Row renderers — used for the first paint and every in-place patch after it,
   so a toggle can never disagree with a re-render. */
function skillRows(skills){
  return skills.map(s => `
    <button class="pick${S.skills.has(s.name) ? ' on' : ''}" data-skill="${esc(s.name)}"
            onclick="toggleSkill('${esc(s.name)}')">
      <span class="box">${S.skills.has(s.name) ? '✓' : ''}</span>
      <span class="n">${esc(s.name)}</span>
      <span class="grow"></span>
      <span class="desc">${esc((s.description || '').slice(0, 58))}</span>
      <span class="exx" onclick="event.stopPropagation();toggleExclude('skills','${esc(s.name)}',true)"
        title="Exclude globally — hidden from every founding until you bring it back">✕</span>
    </button>`).join('');
}
function cmdRows(cmds){
  if(!cmds.length) return `<div class="loading">Nothing matches.</div>`;
  return cmds.map(c => `
    <button class="pick${S.cmds.has(c.name) ? ' on' : ''}" data-cmd="${esc(c.name)}"
            onclick="toggleCmd('${esc(c.name)}')">
      <span class="box">${S.cmds.has(c.name) ? '✓' : ''}</span>
      <span class="n mono">${esc(c.name)}</span>
      <span class="grow"></span>
      <span class="exx" onclick="event.stopPropagation();toggleExclude('commands','${esc(c.name)}',true)"
        title="Exclude globally — hidden from every founding until you bring it back">✕</span>
    </button>`).join('');
}

/* Toggles patch ONE row and ONE counter. No remount, so scroll and focus survive. */
function flipRow(el, on, countId, size, total, word){
  if(el){
    el.classList.toggle('on', on);
    el.querySelector('.box').textContent = on ? '✓' : '';
  }
  const c = document.getElementById(countId);
  if(c) c.textContent = `${size} of ${total} selected`;
}

window.toggleSkill = (n) => {
  const on = !S.skills.has(n);
  on ? S.skills.add(n) : S.skills.delete(n);
  const total = (S.survey.knowledge.skills || []).length;
  flipRow(document.querySelector(`[data-skill="${CSS.escape(n)}"]`), on,
          'skill-count', S.skills.size, total);
  updateTally();
};
window.toggleCmd = (n) => {
  const on = !S.cmds.has(n);
  on ? S.cmds.add(n) : S.cmds.delete(n);
  const total = (S.survey.knowledge.commands || []).length;
  flipRow(document.querySelector(`[data-cmd="${CSS.escape(n)}"]`), on,
          'cmd-count', S.cmds.size, total);
  updateTally();
};
function updateTally(){
  const t = document.getElementById('train-tally');
  if(t) t.textContent = String(S.skills.size + S.cmds.size + S.folders.length);
}
window.dropFolder = (i) => { S.folders.splice(i, 1); viewTrain(S.surveyFor); };

/* Global exclusions — reversible in place, persisted machine-wide. */
window.toggleExclude = async (kind, name, excluded) => {
  let r;
  try{ r = await POST('/api/next/exclude', {kind, name, excluded}); }
  catch(e){ r = {ok: false}; }
  if(!r.ok) return;
  if(S.survey) S.survey.exclusions = r.exclusions;
  if(excluded){ S.picked.delete(name); S.skills.delete(name); S.cmds.delete(name); }
  const h = location.hash || '';
  if(h.startsWith('#/found/equip')) viewEquip(h.split('/')[3]);
  else if(h.startsWith('#/found/train')) viewTrain(h.split('/')[3]);
};

/* --- the wiring run ----------------------------------------------------- */
function viewWiring(fid){
  mount(`
    ${chrome('Wiring the firm')}
    <div class="narrow step thinking">
      <h2>Putting the tools in the right hands.</h2>
      <div class="pulsebar"><i></i></div>
      <div class="stage-meta">
        <span>This usually takes a few minutes — it's doing real work.</span>
        <span class="clock" id="elapsed">0:00</span>
      </div>
      <div class="thoughts" id="thoughts" aria-live="polite"></div>
    </div>
  `);
  stageStart('wiring');
  pollWire(fid);
}

async function pollWire(fid){
  if(!S.wireJob || !location.hash.startsWith('#/found/wiring')) return;
  let r;
  try{ r = await GET('/api/next/wire/' + S.wireJob + '?cursor=' + S.wireCursor); }
  catch(e){ setTimeout(() => pollWire(fid), 1500); return; }

  if(r.narration && r.narration.length){
    stageReal(r.narration);
    S.wireCursor = r.cursor;
  }
  if(r.status === 'ready'){
    S.plan = r.plan; S.wireJob = null;
    S.lastGaps = r.plan.gaps || [];   // the Co-Board brief needs to know the weak points
    return stageFinale(() => go('#/found/loadout/' + fid));
  }
  if(r.status === 'failed' || !r.ok){
    S.error = r.error || 'The wiring agent could not finish.';
    S.wireJob = null; stageStop();
    return go('#/found/train/' + fid);
  }
  setTimeout(() => pollWire(fid), 600);
}

/* --- the loadout review — the law, before it binds ---------------------- */
/* The Board's pen on the law — anything on the table can be handed to anyone,
   anything assigned can be taken away, right here before it's signed. */
function addLoadRow(m, mi){
  const pool = [
    ...[...S.skills].filter(n => !m.skills.includes(n)).map(n => ({kind: 'skills', n})),
    ...[...S.cmds].filter(n => !m.commands.includes(n)).map(n => ({kind: 'commands', n})),
    ...[...S.picked].filter(n => !m.mcp.includes(n)).map(n => ({kind: 'mcp', n})),
  ];
  if(!pool.length) return '';
  return `
  <details class="addload">
    <summary class="hint" style="cursor:pointer;margin-top:var(--s2)">＋ hand them something else</summary>
    <div class="needs" style="margin-top:var(--s2)">
      ${pool.map(it => `<button class="cli" onclick="addLoad(${mi},'${it.kind}','${esc(it.n)}')">＋ ${esc(it.n)}</button>`).join('')}
    </div>
  </details>`;
}
window.dropLoad = (mi, kind, i) => {
  S.plan.members[mi][kind].splice(i, 1);
  viewLoadout(S.surveyFor);
};
window.addLoad = (mi, kind, name) => {
  const m = S.plan.members[mi];
  if(kind === 'knowledge') return;
  if(!m[kind].includes(name)) m[kind].push(name);
  viewLoadout(S.surveyFor);
};

          </div>

                     style="font-family:var(--mono);font-size:13px"
                     placeholder="${esc(k)}">

          <p class="hint">Leave blank to supply later — the servers that need them won't start until you do.</p>
        </div>` : ''}

      <div class="stage-foot">
        <span class="tally">Signing this writes the loadouts, the armory, and the charter.</span>
        <div style="display:flex;gap:var(--s2)">
          <button class="btn quiet" onclick="go('#/found/train/' + '${esc(fid)}')">Back</button>
          <button class="btn primary" id="sign">Make it law</button>
        </div>
      </div>
    </div>
  `);
  S.error = null;

  document.getElementById('sign').onclick = async () => {
    const btn = document.getElementById('sign');
    btn.disabled = true; btn.textContent = 'Writing…';
    const keyvals = {};
    for(const k of keys){
      const el = document.getElementById('key-' + k);

    const r = await POST('/api/next/wire-commit', {firm_id: fid, plan: p, keys: keyvals});
    if(!r.ok){
      S.error = r.error || 'Could not wire the firm.';

  `);
  stageStart('brief');

async function pollBrief(fid){
  if(!S.briefJob || !location.hash.startsWith('#/found/briefing')) return;
  let r;
  try{ r = await GET('/api/next/brief/' + S.briefJob + '?cursor=' + S.briefCursor); }
  catch(e){ setTimeout(() => pollBrief(fid), 1500); return; }

  if(r.narration && r.narration.length){
    stageReal(r.narration);
    S.briefCursor = r.cursor;
  }
  if(r.status === 'ready'){
    S.brief = r.brief; S.briefJob = null;
    return stageFinale(() => go('#/found/coboard/' + fid));
  }
  if(r.status === 'failed' || !r.ok){
    S.error = r.error || 'The briefing could not be written.';
    S.briefJob = null; stageStop();
    return go('#/found/live/' + fid);
  }
  setTimeout(() => pollBrief(fid), 600);
}

/* --- the level-up ------------------------------------------------------- */
async function viewCoboard(fid){
  const f = S.founded && S.founded.firm_id === fid
    ? S.founded
    : {firm_id: fid, name: (S.readiness && S.readiness.name) || fid,
       hired: (S.readiness && S.readiness.hired) || []};
  if(!S.brief) return go('#/found/alive/' + fid);   // already briefed — nothing to sit through

  let known = S.coboard;
  if(!known){
    try{ known = S.coboard = await GET('/api/next/coboard'); }
    catch(e){ known = {briefed: []}; }
  }
  const already = known.briefed.filter(b => b !== fid).length;
  const after = already + 1;

  // The whole building, not just the briefed part — the Board owns more firms
  // than the Co-Board has met, and the card must not undercount his company.
  // Always refetch: a list cached before this founding is one firm short.
  try{ S.firms = (await GET('/api/next/hub')).firms || []; }catch(e){}
  const total = Math.max(S.firms.length, after);
  const unmet = total - after;

  // What it gained — every line a real fact about THIS firm, never a point.
  const hired = f.hired || [];
  const caps = [`Run ${f.name}'s floor — gates, escalations, and spend, by name`];
  if(hired.length) caps.push(
    `Speak for ${hired.slice(0, 2).map(m => m.name).join(' and ')}` +
    `${hired.length > 2 ? ` and ${hired.length - 2} more` : ''} — it knows who owns what`);
  if((S.lastGaps || []).length) caps.push(
    `Watch the ${plural(S.lastGaps.length, 'gap')} it knows this firm has — no surprises on day one`);
  if(S.manifest && S.manifest.cadence) caps.push(
    `Expect the floor to wake every ${S.manifest.cadence}, whether or not you're there`);

  mount(`
    ${chrome('Your Co-Board')}
    <div class="step">
      <div class="stage-head">
        <div class="step-of">Step 5 of 5 · The Co-Board</div>
        <h1>Your Co-Board just learned to run ${esc(f.name)}.</h1>
        <p>It already knew how to govern a Cadre firm — gates, escalations, forensics, spend.
           What it didn't know was <em>this</em> one. Now it does, and it keeps this brief
           current alongside you.</p>
      </div>

      <div class="levelup">
        <div class="lvl-row">
          <span class="lvl-was">${plural(already, 'firm')}</span>
          <span class="lvl-arrow">→</span>
          <span class="lvl-now">${after} of ${plural(total, 'firm')}</span>
        </div>
        <p class="hint">Firms your Co-Board can run the floor of${unmet > 0
          ? ` — ${unmet} more in the building it hasn't met yet` : ''}.</p>
      </div>

      ${S.error ? `<div class="oops">${esc(S.error)}</div>` : ''}

      <div class="ready" style="margin:0 0 var(--s4)">
        <div class="eyebrow">It can now</div>
        ${caps.map(c => `
          <div class="check done">
            <span class="box">✓</span>
            <span class="what">${esc(c)}</span>
          </div>`).join('')}
      </div>

      <div class="rack">
        <div class="rack-head">
          <h3>What it learned</h3>
          <span class="count">.firm/boardroom/BRIEF.md</span>
        </div>
        <div class="briefdoc" id="briefdoc" contenteditable="true"
             spellcheck="false">${esc(S.brief)}</div>
        <p class="hint" style="margin-top:var(--s2)">
          Edit anything that's wrong. This is the document your Co-Board reads before it
          says a word about ${esc(f.name)}.
        </p>
      </div>

      <div class="golive armed">
        <div class="golive-head">
          <div>
            <h3>Bring it to life</h3>
            <p class="hint">Signs the manifest, teaches the Co-Board, and
              ${S.manifest && S.manifest.cadence
                ? 'starts the pulse.' : 'hands you the keys.'}</p>
          </div>
        </div>
        <div class="cadence">
          <span class="grow"></span>
          <button class="btn primary" id="golive">Bring it to life</button>
        </div>
        <div id="pulse-said"></div>
      </div>
    </div>
  `);
  S.error = null;

  document.getElementById('golive').onclick = async () => {
    const btn = document.getElementById('golive');
    btn.disabled = true; btn.textContent = 'Signing…';
    const said = document.getElementById('pulse-said');

    const edited = document.getElementById('briefdoc').innerText;
    const b = await POST('/api/next/brief-commit', {firm_id: fid, brief: edited});
    if(!b.ok){
      said.innerHTML = `<div class="oops">Could not teach the Co-Board.
        <div class="why">${esc(b.error || '')}</div></div>`;
      btn.disabled = false; btn.textContent = 'Bring it to life';
      return;
    }
    const r = await POST('/api/next/manifest',
      {firm_id: fid, manifest: S.manifest || {}});
    if(!r.ok){
      said.innerHTML = `<div class="oops">The brief is saved, but the manifest didn't take.
        <div class="why">${esc(r.error || '')}</div></div>`;
      btn.disabled = false; btn.textContent = 'Bring it to life';
      return;
    }
    S.alive = r;
    S.coboardCount = already;   // the crest shows what it becomes, not what it was
    S.coboard = null;
    go('#/found/alive/' + fid);
  };
}

async function viewAlive(fid){
  // A refresh used to land on #/found/coboard with no brief in memory and bounce the
  // Board back into the briefing they'd already sat through. The alive state is a real
  // place now: it has a URL and it reads itself off disk.
  let f = S.founded && S.founded.firm_id === fid ? S.founded : null;
  if(!f){
    try{
      const rd = await GET('/api/next/readiness/' + fid);
      f = {firm_id: fid, name: rd.name, hired: rd.hired || []};
    }catch(e){ return go('#/'); }
  }
  if(!S.coboardCount){
    try{
      const known = await GET('/api/next/coboard');
      S.coboardCount = Math.max(0, (known.briefed || []).length - 1);
    }catch(e){}
  }
  // The building — for this floor's number and its live telemetry.
  try{ S.firms = (await GET('/api/next/hub')).firms || []; }catch(e){}
  const tele = S.firms.find(x => x.id === fid) || null;
  const floorNo = tele && tele.floor ? pad2(tele.floor) : null;
  const running = tele ? Math.max(0, tele.running - tele.stale_runs) : 0;

  // The cadence is read from the systemd timer, not session memory — a
  // refreshed page shows the truth and can change it right here.
  let ps = {enabled: false, interval: null};
  try{ ps = await GET('/api/next/pulse-state/' + fid); }catch(e){}
  const cadence = ps.enabled ? ps.interval : null;
  const after = ((S.coboardCount || 0) + 1);

  mount(`
    ${chrome(esc(f.name))}
    <div class="narrow arrived">
      <div class="crest">
        <div class="crest-ring"></div>
        <div class="crest-core">${after}</div>
      </div>

      <h1 class="rise-1">${esc(f.name)} is alive.</h1>
      <p class="sub rise-2">${cadence
        ? `It wakes every ${esc(cadence)} and works whether or not you're watching.`
        : `It's yours to wake. Pulse it whenever you want it to work.`}
         Your Co-Board runs ${plural(after, 'firm')} now, and it knows this one by name.</p>

      <div class="nameplates rise-3">
        ${(f.hired || []).map((m, i) => `
          <div class="nameplate" style="animation-delay:${600 + i * 90}ms">
            <span class="name">${esc(m.name)}</span>
            <span class="role">${esc(m.role)}</span>
          </div>`).join('')}
      </div>

      <div class="firmcard rise-4${running ? ' live' : ''}" id="firmcard">
        <div class="fc-head">
          <div>
            <h3>${esc(f.name)}</h3>
            <div class="slug">${floorNo ? `Floor ${floorNo} · ` : ''}${esc(fid)}</div>
          </div>
          <span class="pip${running ? ' live' : ''}" id="fc-pip">
            <span class="dot"></span><span id="fc-pip-t">${running ? plural(running, 'run') : 'Quiet'}</span>
          </span>
        </div>
        ${tele ? `
        <div class="meta">
          <span>${tele.members_active}/${tele.members_total} on staff</span>
          <span>${cadence ? 'wakes every ' + esc(cadence) : 'manual pulse'}</span>
          <span>$${(tele.spend_usd || 0).toFixed(2)} payroll</span>
        </div>` : ''}
        <div class="cadence" style="margin-top:var(--s3)">
          <button class="tick${!cadence ? ' on' : ''}" data-cad=""
            title="No timer — the firm works only when pulsed by hand">Manual</button>
          ${INTERVALS.map(i => `
            <button class="tick${cadence === i ? ' on' : ''}" data-cad="${i}"
              title="Wake the firm every ${i}">${i}</button>`).join('')}
        </div>
        <div class="fc-actions">
          <button class="btn primary" id="fc-pulse">Pulse the firm</button>
          <button class="btn" onclick="location.href='/f/${esc(fid)}/'">Walk the floor</button>
        </div>
        <div id="fc-said"></div>
      </div>

      <button class="btn quiet rise-4" style="margin-top:var(--s3)" onclick="go('#/')">
        Back to the boardroom</button>
    </div>
  `);

  for(const b of document.querySelectorAll('[data-cad]')){
    b.onclick = async () => {
      b.disabled = true; b.textContent = '…';
      const iv = b.dataset.cad;
      let r;
      try{ r = await POST('/api/next/pulse', {firm_id: fid, interval: iv || '30m', enable: !!iv}); }
      catch(e){ r = {ok: false}; }
      if(!r.ok){
        b.disabled = false; b.textContent = iv || 'Manual';
        b.title = r.error || 'could not change the pulse';
        return;
      }
      viewAlive(fid);
    };
  }

  document.getElementById('fc-pulse').onclick = async () => {
    const btn = document.getElementById('fc-pulse');
    btn.disabled = true; btn.textContent = 'Waking the floor…';
    const said = document.getElementById('fc-said');
    // Remember the last pulse report BEFORE firing, so we only trust a newer one.
    let before = 0;
    try{ const ps = await GET('/f/' + fid + '/api/pulse-status'); before = ps.mtime || 0; }catch(e){}
    let r;
    try{ r = await POST('/f/' + fid + '/api/action/pulse/firm', {}); }
    catch(e){ r = {ok: false, error: 'Could not reach the firm.'}; }
    if(!r.ok){
      said.innerHTML = `<div class="oops" style="margin:var(--s3) 0 0">${esc(r.error || 'The pulse did not fire.')}</div>`;
      btn.disabled = false; btn.textContent = 'Pulse the firm';
      return;
    }
    // No green until the floor actually answers. The FAST signal is a run row
    // appearing (seconds); the pulse report only lands after every member
    // finishes (minutes, the pulse is synchronous) — watch runs first, keep
    // the report as the 0-ran fallback.
    said.innerHTML = `<div class="hint" style="margin-top:var(--s4)">Pulse sent — waiting for the floor to answer…</div>`;
    let sum = null, live = 0;
    for(let i = 0; i < 15; i++){
      await new Promise(res => setTimeout(res, 3000));
      try{
        const firms = (await GET('/api/next/hub')).firms || [];
        const me = firms.find(x => x.id === fid);
        live = me ? Math.max(0, me.running - me.stale_runs) : 0;
        if(live > 0) break;
      }catch(e){}
      try{
        const ps = await GET('/f/' + fid + '/api/pulse-status');
        if(ps.available && (ps.mtime || 0) > before && ps.summary){ sum = ps.summary; break; }
      }catch(e){}
    }
    if(live > 0 || (sum && sum.ran > 0)){
      document.getElementById('firmcard').classList.add('live');
      document.getElementById('fc-pip').classList.add('live');
      document.getElementById('fc-pip-t').textContent = 'Waking';
      said.innerHTML = `<div class="alive" style="margin-top:var(--s4)">
        ${plural(live || sum.ran, 'member')} took the floor. Walk it to watch, or let it work.</div>`;
      btn.textContent = 'Pulse sent';
      watchFloor(fid);
    } else if(sum){
      const reasons = Object.entries(sum.skip_reasons || {})
        .map(([k, v]) => `${k} ×${v}`).join(' · ') || 'no reason reported';
      said.innerHTML = `<div class="oops" style="margin:var(--s3) 0 0">
        The pulse fired but nobody worked — ${esc(reasons)}.</div>`;
      btn.disabled = false; btn.textContent = 'Pulse the firm';
    } else {
      said.innerHTML = `<div class="hint" style="margin-top:var(--s4)">
        The pulse was dispatched but hasn't reported back yet — walk the floor to see it live.</div>`;
      btn.disabled = false; btn.textContent = 'Pulse the firm';
    }
  };
  if(running) watchFloor(fid);
}

/* Keep the card honest while the Board is looking at it — real runs, never a
   spinner. Stops the moment they leave the page. */
async function watchFloor(fid){
  if(S.watching === fid) return;
  S.watching = fid;
  const here = '#/found/alive/' + fid;
  let sawRun = false;
  for(let i = 0; i < 36 && location.hash === here; i++){
    await new Promise(res => setTimeout(res, 5000));
    if(location.hash !== here) break;
    let firms;
    try{ firms = (await GET('/api/next/hub')).firms || []; }catch(e){ continue; }
    const f = firms.find(x => x.id === fid);
    const card = document.getElementById('firmcard');
    const pip = document.getElementById('fc-pip');
    const t = document.getElementById('fc-pip-t');
    if(!f || !card || !pip || !t) break;
    const running = Math.max(0, f.running - f.stale_runs);
    if(running > 0){
      sawRun = true;
      card.classList.add('live'); pip.classList.add('live');
      t.textContent = plural(running, 'run');
    } else if(sawRun){
      // It worked and finished while they watched — say so, honestly.
      card.classList.remove('live'); pip.classList.remove('live');
      t.textContent = 'Shift done';
      break;
    }
  }
  S.watching = null;
}

window.pickInterval = (i) => { S.interval = i; viewLive(S.readiness && S.readiness.firm_id); };
window.toggleAuto = () => { S.autoPulse = !S.autoPulse; viewLive(S.readiness && S.readiness.firm_id); };
window.pickChannel = (c) => { S.channel = c; viewLive(S.readiness && S.readiness.firm_id); };
window.setLean = (v) => { S.leanMode = v; viewLive(S.readiness && S.readiness.firm_id); };
window.pickNotifyPreset = (i) => {
  S.chPreset = S.chPreset === i ? null : i;
  S.chToken = '';   // the preset carries the token; typing again overrides
  viewLive(S.readiness && S.readiness.firm_id);
};

/* ------------------------------------------------------------------ router */
window.go = (hash) => {
  if(location.hash === hash) route(); else location.hash = hash;
};

async function route(){
  const h = location.hash || '#/';
  // The window is only there when you're at the top of the building.
  document.body.classList.toggle('vista', !h.startsWith('#/found'));
  if(h === '#/desk')           return viewDesk();
  if(h === '#/found')          return viewAsk();
  if(h === '#/found/thinking') return S.job ? viewThinking() : go('#/found');
  if(h === '#/found/roster')   return viewRoster();
  if(h.startsWith('#/found/hired'))   return viewHired(h.split('/')[3]);
  if(h.startsWith('#/found/equip'))   return viewEquip(h.split('/')[3]);
  if(h.startsWith('#/found/train'))   return viewTrain(h.split('/')[3]);
  if(h.startsWith('#/found/wiring'))  return S.wireJob ? viewWiring(h.split('/')[3])
                                                       : go('#/found/train/' + h.split('/')[3]);
  if(h.startsWith('#/found/loadout')) return viewLoadout(h.split('/')[3]);
  if(h.startsWith('#/found/live'))    return viewLive(h.split('/')[3]);
  if(h.startsWith('#/found/briefing'))return S.briefJob ? viewBriefing(h.split('/')[3])
                                                        : go('#/found/live/' + h.split('/')[3]);
  if(h.startsWith('#/found/coboard')) return viewCoboard(h.split('/')[3]);
  if(h.startsWith('#/found/alive'))   return viewAlive(h.split('/')[3]);

  try{
    const data = await GET('/api/next/hub');
    S.firms = data.firms || [];
    if(data.prefs && typeof data.prefs.notes === 'string') S.notes = data.prefs.notes;
  }catch(e){
    S.firms = [];
  }
  viewBoardroom();
}

addEventListener('hashchange', route);
route();

/* Clicking anywhere outside the runs menu puts it away. */
document.addEventListener('click', (e) => {
  if(!S.runsOpen || e.target.closest('.runswrap')) return;
  S.runsOpen = false;
  const m = document.getElementById('runsmenu');
  if(m) m.hidden = true;
  const p = document.getElementById('runspill');
  if(p){ p.classList.remove('open'); p.setAttribute('aria-expanded', 'false'); }
});

/* Same for a model menu — closed in the DOM directly, no re-render, so a
   click that lands on Hire is never wiped mid-commit by a roster repaint. */
document.addEventListener('click', (e) => {
  if(S.modelMenu == null || e.target.closest('.modelwrap')) return;
  S.modelMenu = null;
  document.querySelectorAll('.modelmenu').forEach(el => el.hidden = true);
  document.querySelectorAll('.modelpill.open').forEach(el => {
    el.classList.remove('open');
    el.setAttribute('aria-expanded', 'false');
  });
});

/* The boardroom keeps itself current — but never mid-thought, mid-drag,
   or while a deploy agenda is being picked. */
setInterval(() => {
  if((location.hash || '#/') === '#/' && !S.dragging && !S.deploy) route();
}, 20000);
</script>
